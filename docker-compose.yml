services:
  db:
    image: postgres:15-alpine
    container_name: neftegaz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neftegaz
      POSTGRES_PASSWORD: neftegaz
      POSTGRES_DB: neftegaz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neftegaz -d neftegaz"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    container_name: neftegaz_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: neftegaz
      POSTGRES_PASSWORD: neftegaz
      POSTGRES_DB: neftegaz_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neftegaz -d neftegaz_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
